AWSTemplateFormatVersion: '2010-09-09'
Description: Weekly VOC analyst bot

Parameters:
  ImageUri:
    Type: String
    Default: 216989105690.dkr.ecr.ap-northeast-2.amazonaws.com/voc-analyst:latest
    Description: Fully qualified ECR image reference used for both functions (tag or digest)
  WebFunctionRoleArn:
    Type: String
    Default: arn:aws:iam::216989105690:role/voc-analyst-web-role
    Description: ARN of the IAM execution role for the web Lambda function

  JobFunctionRoleArn:
    Type: String
    Default: arn:aws:iam::216989105690:role/voc-analyst-job-role
    Description: ARN of the IAM execution role for the scheduled Lambda function
  ScheduleExpression:
    Type: String
    Default: cron(0 0 ? * MON *)
    Description: EventBridge cron expression for scheduled job
  ScheduleExpressionTimezone:
    Type: String
    Default: Asia/Seoul
    Description: Scheduler timezone (e.g., Asia/Seoul)
  SchedulerRoleArn:
    Type: String
    Default: arn:aws:iam::216989105690:role/voc-analyst-cron-role
    Description: ARN of the IAM role assumed by EventBridge Scheduler to invoke the job Lambda

  SlackBgFunctionRoleArn:
    Type: String
    Default: arn:aws:iam::216989105690:role/voc-analyst-slack-bg-role
    Description: ARN of the IAM execution role for the Slack background Lambda function
  SlackBotToken:
    Type: String
    NoEcho: true
    Description: Slack Bot User OAuth Token (xoxb-...)
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: Slack Signing Secret for request verification

  VocBigqueryProject:
    Type: String
    NoEcho: true
    Description: "VOC_BIGQUERY_PROJECT environment variable (synced from .env)"

  VocBigqueryTable:
    Type: String
    NoEcho: true
    Description: "VOC_BIGQUERY_TABLE environment variable (synced from .env)"

  VocBigqueryStartDate:
    Type: String
    NoEcho: true
    Description: "VOC_BIGQUERY_START_DATE environment variable (synced from .env)"

  VocBigqueryLocation:
    Type: String
    NoEcho: true
    Description: "VOC_BIGQUERY_LOCATION environment variable (synced from .env)"

  VocGoogleCredentialsSsmKey:
    Type: String
    NoEcho: true
    Description: "VOC_GOOGLE_CREDENTIALS_SSM_KEY environment variable (synced from .env)"

  VocSlackChannel:
    Type: String
    NoEcho: true
    Description: "VOC_SLACK_CHANNEL environment variable (synced from .env)"

Resources:
  WebFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !Ref WebFunctionRoleArn
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Architectures:
        - arm64
      Timeout: 15
      MemorySize: 512
      Environment:
        Variables:
          AWS_LWA_PORT: "8080"
          APP_MODE: "web"
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          SLACK_BG_FUNCTION_NAME: !Ref SlackBgFunction
          VOC_BIGQUERY_PROJECT: !Ref VocBigqueryProject
          VOC_BIGQUERY_TABLE: !Ref VocBigqueryTable
          VOC_BIGQUERY_START_DATE: !Ref VocBigqueryStartDate
          VOC_BIGQUERY_LOCATION: !Ref VocBigqueryLocation
          VOC_GOOGLE_CREDENTIALS_SSM_KEY: !Ref VocGoogleCredentialsSsmKey
          VOC_SLACK_CHANNEL: !Ref VocSlackChannel

  WebFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      TargetFunctionArn: !Ref WebFunction
      AuthType: NONE

  WebFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: NONE

  WebFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref WebFunction
      Action: lambda:InvokeFunction
      Principal: "*"
      InvokedViaFunctionUrl: true


  JobFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !Ref JobFunctionRoleArn
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Architectures:
        - arm64
      Timeout: 120
      MemorySize: 1024
      Environment:
        Variables:
          AWS_LWA_PORT: "8080"
          AWS_LWA_PASS_THROUGH_PATH: "/events"
          APP_MODE: "job"
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          SLACK_SIGNING_SECRET: !Ref SlackSigningSecret
          VOC_BIGQUERY_PROJECT: !Ref VocBigqueryProject
          VOC_BIGQUERY_TABLE: !Ref VocBigqueryTable
          VOC_BIGQUERY_START_DATE: !Ref VocBigqueryStartDate
          VOC_BIGQUERY_LOCATION: !Ref VocBigqueryLocation
          VOC_GOOGLE_CREDENTIALS_SSM_KEY: !Ref VocGoogleCredentialsSsmKey
          VOC_SLACK_CHANNEL: !Ref VocSlackChannel

  CronSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${AWS::StackName}-cron"
      FlexibleTimeWindow:
        Mode: FLEXIBLE
        MaximumWindowInMinutes: 5
      ScheduleExpression: !Ref ScheduleExpression
      ScheduleExpressionTimezone: !Ref ScheduleExpressionTimezone
      Target:
        Arn: !GetAtt JobFunction.Arn
        RoleArn: !Ref SchedulerRoleArn


  SlackBgFunction:
    Type: AWS::Lambda::Function
    Properties:
      Role: !Ref SlackBgFunctionRoleArn
      PackageType: Image
      Code:
        ImageUri: !Ref ImageUri
      Architectures:
        - arm64
      Timeout: 120
      MemorySize: 512
      Environment:
        Variables:
          AWS_LWA_PORT: "8080"
          AWS_LWA_PASS_THROUGH_PATH: "/slack/background"
          APP_MODE: "slack-bg"
          SLACK_BOT_TOKEN: !Ref SlackBotToken
          VOC_BIGQUERY_PROJECT: !Ref VocBigqueryProject
          VOC_BIGQUERY_TABLE: !Ref VocBigqueryTable
          VOC_BIGQUERY_START_DATE: !Ref VocBigqueryStartDate
          VOC_BIGQUERY_LOCATION: !Ref VocBigqueryLocation
          VOC_GOOGLE_CREDENTIALS_SSM_KEY: !Ref VocGoogleCredentialsSsmKey
          VOC_SLACK_CHANNEL: !Ref VocSlackChannel

Outputs:
  WebFunctionUrl:
    Description: Function URL for the Litestar web endpoint
    Value: !GetAtt WebFunctionUrl.FunctionUrl

  JobFunctionName:
    Description: Name of the scheduled job function
    Value: !Ref JobFunction

  SlackBgFunctionName:
    Description: Name of the Slack background function
    Value: !Ref SlackBgFunction
  SlackEventsUrl:
    Description: URL for Slack Events/Commands webhook
    Value: !Sub "${WebFunctionUrl}slack/events"
